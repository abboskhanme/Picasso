# Picasso ERP — PRODUCTION (VPS + Caddy avtomatik HTTPS)
# Ishga tushirish:
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build
services:
  db:
    image: postgres:16-alpine
    container_name: picasso_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Tashqi port YO'Q — faqat ichki tarmoq (xavfsizlik)

  backend:
    build: ./backend
    container_name: picasso_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      SEED_ON_START: ${SEED_ON_START:-true}
      APP_ENV: production
      # Brauzer same-origin /api ga murojaat qiladi, lekin CORS to'g'ridan-to'g'ri
      # so'rovlar uchun domeniga cheklanadi
      CORS_ORIGINS: https://${DOMAIN}
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads        # yuklangan rasmlar (redeploy'da saqlanadi)
    # Tashqi port YO'Q — Caddy /api/* orqali proxy qiladi

  frontend:
    build:
      context: ./frontend
      args:
        # Brauzer same-origin /api ga murojaat qiladi (Caddy /api ni backendga yuboradi)
        # Bu domen ham, yalang'och IP ham bir xil ishlashini ta'minlaydi
        VITE_API_URL: /api
    container_name: picasso_frontend
    restart: unless-stopped
    depends_on:
      - backend
    # Tashqi port YO'Q — Caddy proxy qiladi

  caddy:
    image: caddy:2-alpine
    container_name: picasso_caddy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  uploads:
