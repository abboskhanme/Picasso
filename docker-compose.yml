# ============================================================
#  Picasso ERP — YAGONA ish muhiti (hot-reload bilan)
#
#  Bir marta ishga tushiring:   docker compose up -d
#  Keyin kod o'zgarganda HECH NARSA qilish shart emas:
#    • backend  — uvicorn --reload (.py o'zgarsa o'zi qayta yuklanadi)
#    • frontend — Vite HMR (sahifa o'zi yangilanadi)
#
#  Manzillar:
#    Sayt:      http://localhost:3000
#    API:       http://localhost:8000
#    Postgres:  localhost:5432  (ma'lumotlar pgdata volume'da saqlanadi)
#
#  Serverga chiqarish uchun alohida: docker-compose.prod.yml (DEPLOY.md)
# ============================================================
services:
  db:
    image: postgres:16-alpine
    container_name: picasso_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-picasso}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-picasso_secret}
      POSTGRES_DB: ${POSTGRES_DB:-picasso}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-picasso}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: picasso_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-picasso}:${POSTGRES_PASSWORD:-picasso_secret}@db:5432/${POSTGRES_DB:-picasso}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      SEED_ON_START: "true"
      UPLOAD_DIR: /data/uploads
    ports:
      - "8000:8000"
    # Kod jonli ulanadi — image ichiga muhrlanmaydi
    volumes:
      - ./backend/app:/code/app
      - ./backend/tests:/code/tests              # testlar (docker compose exec backend pytest)
      - ./backend/migrations:/code/migrations    # alembic migratsiyalari (jonli)
      - uploads:/data/uploads                    # yuklangan rasmlar (doimiy)
    # --reload: .py fayl o'zgarsa server o'zi qayta yuklanadi
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    image: node:20-alpine
    container_name: picasso_frontend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - backend
    environment:
      # Brauzer same-origin /api ga so'rov yuboradi; Vite uni backendga proxy qiladi
      VITE_API_URL: /api
      VITE_PROXY_TARGET: http://backend:8000
      # Docker volume'da fayl o'zgarishini ishonchli aniqlash (HMR uchun)
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:5173"
    # Manba kod jonli ulanadi; node_modules konteyner ichida qoladi
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    # Birinchi startda paketlarni o'rnatadi, keyin Vite dev server (HMR)
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  pgdata:
  frontend_node_modules:
  uploads:
