services:
  db:
    image: postgres:16-alpine
    container_name: picasso_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-picasso}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-picasso_secret}
      POSTGRES_DB: ${POSTGRES_DB:-picasso}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-picasso}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: picasso_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-picasso}:${POSTGRES_PASSWORD:-picasso_secret}@db:5432/${POSTGRES_DB:-picasso}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      SEED_ON_START: "true"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: picasso_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
